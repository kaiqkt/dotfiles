[[items]]
  template = "kitty"
  file = "~/.config/kitty/colors.conf"
  rewrite = true

[[items]]
  template = "sketchybar"
  file = "~/.config/sketchybar/colors.sh"
  rewrite = true
  hook = "pgrep -x sketchybar > /dev/null && sketchybar --reload || true"

[[items]]
  template = "tmux"
  file = "~/.config/tmux/config/theme.conf"
  rewrite = true
  hook = "pgrep -x tmux > /dev/null && tmux source-file ~/.config/tmux/config/theme.conf || true"

[[items]]
  template = "borders"
  file = "~/.config/borders/bordersrc"
  rewrite = true
  hook = "pgrep -x borders > /dev/null && ~/.config/borders/bordersrc || true"

[[items]]
  template = "fzf"
  file = "~/.fzfrc"
  rewrite = true
