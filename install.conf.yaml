- defaults:
    link:
      relink: true
      force: true

- clean: ["~"]

- create:
    - ~/.local/bin
    - ~/.config/opencode

- link:
    ~/.zshenv: zshenv
    ~/.config/zsh: zsh
    ~/.Brewfile: homebrew/Brewfile
    ~/.config/kitty: kitty
    ~/.fzfrc: fzfrc
    ~/.config/tmux: tmux
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/RTK.md: claude/RTK.md
    ~/.config/opencode/opencode.json: opencode/opencode.json
    ~/.config/borders: borders
    ~/.config/sketchybar: sketchybar
    ~/.config/aerospace: aerospace
    ~/.config/lazygit: lazygit
    ~/.config/htop: htop
    ~/.config/fastfetch: fastfetch
    ~/.config/bat: bat
    ~/.editorconfig: editorconfig
    ~/.asdfrc: asdfrc
    ~/.tool-versions: tool-versions
    ~/.local/bin/git-multi: scripts/git-multi

- shell:
    - [brew bundle --file=homebrew/Brewfile, Installing Homebrew packages]
    - [asdf plugin add java || true, Adding asdf java plugin]
    - [asdf plugin add kotlin || true, Adding asdf kotlin plugin]
    - [asdf plugin add golang || true, Adding asdf golang plugin]
    - [asdf install, Installing tool versions]
    - ["test -f ~/.config/tmux/plugins/tpm/tpm || git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm", Installing TPM]
    - ["~/.config/tmux/plugins/tpm/bin/install_plugins", Installing tmux plugins]
    - description: Setting up flavours (Base16 theme manager)
      command: |
        mkdir -p "$HOME/Library/Preferences/flavours"
        cp "$(pwd)/flavours/config.toml" "$HOME/Library/Preferences/flavours/config.toml"
        mkdir -p "$HOME/Library/Application Support/flavours/base16/templates"
        for app in kitty sketchybar tmux borders fzf; do
          ln -sf "$(pwd)/flavours/templates/$app" "$HOME/Library/Application Support/flavours/base16/templates/$app"
        done
        flavours update all || true
        flavours apply nord || true
    - description: Applying macOS defaults
      command: |
        # Keyboard
        defaults write NSGlobalDomain KeyRepeat -int 2
        defaults write NSGlobalDomain InitialKeyRepeat -int 15
        defaults write NSGlobalDomain ApplePressAndHoldEnabled -bool false
        # Dock
        defaults write com.apple.dock autohide -bool true
        defaults write com.apple.dock autohide-delay -float 0
        defaults write com.apple.dock autohide-time-modifier -float 0.3
        defaults write com.apple.dock mru-spaces -bool false
        # Finder
        defaults write com.apple.finder AppleShowAllFiles -bool true
        defaults write com.apple.finder ShowPathbar -bool true
        defaults write com.apple.finder ShowStatusBar -bool true
        defaults write com.apple.finder CreateDesktop -bool false
        defaults write com.apple.finder NewWindowTarget -string "PfHm"
        defaults write com.apple.finder NewWindowTargetPath -string "file://$HOME/"
        defaults write com.apple.finder FinderSpawnTab -bool true
        defaults write com.apple.finder FXEnableExtensionChangeWarning -bool false
        defaults write com.apple.finder FXEnableRemoveFromICloudDriveWarning -bool false
        defaults write com.apple.finder WarnOnEmptyTrash -bool true
        defaults write com.apple.finder FXRemoveOldTrashItems -bool true
        defaults write com.apple.finder FXDefaultSearchScope -string "SCcf"
        # Misc
        defaults write NSGlobalDomain AppleShowAllExtensions -bool true
        defaults write NSGlobalDomain NSAutomaticSpellingCorrectionEnabled -bool false
        defaults write NSGlobalDomain NSAutomaticWindowAnimationsEnabled -bool false
        defaults write NSGlobalDomain _HIHideMenuBar -bool true
        killall Dock Finder SystemUIServer &>/dev/null || true
